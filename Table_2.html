<html>
<head>
  <title>Example of table tag</title>
</head>
 <body>
   <table border="10" width="100%" height="500px" cellpadding="5px" cellspacing="10px">
     <tr>
       <th width="14%">Roll no</th>
       <th width="14%">Full Name</th>
       <th width="14%">Course name</th>
       <th width="14%">Year</th>
       <th width="14%">Semester</th>
       <th width="14%">Obtain Marks</th>
       <th width="14%">Total Marks</th>
     </tr>
     <tr align="right">
       <td>12341</td>
       <td>Ritik kumar mishra</td>
       <td rowspan="3">Diploma</td>
       <td>3rd</td>
       <td>5th</td>
       <td>897</td>
       <td rowspan="5">1000</td>
     </tr>
     <tr align="centre">
       <td>12342</td>
       <td>Shubham kumar mishra</td>
       <td colspan="2">4th</td>
       <td>872</td>
     </tr>
     <tr>
       <td>12343</td>
       <td>Rishu raj</td>
       <td>4th</td>
       <td>6th</td>
       <td>859</td>
     </tr>
     <tr valign="middle">
       <td>12344</td>
       <td>Aditya Kumar Mishra</td>
       <td>B.tech</td>
       <td>2nd</td>
       <td>4th</td>
       <td>832</td>
     </tr>
     <tr>
       <td>12345</td>
       <td>Rohit Shrama</td>
       <td>M.tech</td>
       <td colspan="2">1st</td>
       <td>801</td>
     </tr>
   </table>
</body>
</html>
